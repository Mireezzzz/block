services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: jbi-frontend-builder

    volumes:
      - frontend-dist:/app/dist

    restart: "no"

    networks:
      - jbi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: jbi-backend

    ports:
      - "5000:5000"

    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1

    restart: unless-stopped

    networks:
      - jbi-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Читает статику из volume frontend-dist
  nginx:
    build:
      context: ./nginx 
      dockerfile: Dockerfile

    container_name: jbi-nginx

    ports:
      - "80:80"

    volumes:
      - frontend-dist:/usr/share/nginx/html:ro

    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - jbi-network


volumes:
  frontend-dist:

networks:
  jbi-network:
    driver: bridge
