# =============================================================
# nginx.conf — конфиг для React SPA + проксирование к Flask
# =============================================================

server {
    # nginx слушает на порту 80 внутри контейнера
    listen 80;

    # Корневая папка со статикой (куда Vite положил сборку)
    root /usr/share/nginx/html;
    index index.html;

    # ── Проксирование API-запросов к Flask ────────────────────
    # Все запросы, начинающиеся с /api/, перенаправляются к бэкенду.
    # "backend" — это имя сервиса из docker-compose.yml (Docker DNS резолвит его автоматически)
    # Порт 5000 — тот, на котором слушает gunicorn внутри контейнера backend
    location /api/ {
        proxy_pass http://backend:5000;

        # Передаём реальный IP клиента во Flask (для логов)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        # Таймауты (оптимизатор может считать несколько секунд)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Обслуживание React SPA ────────────────────────────────
    # try_files пробует путь в таком порядке:
    # 1. $uri — ищет точный файл (например /assets/index-abc.js)
    # 2. $uri/ — ищет директорию
    # 3. /index.html — если ничего не нашёл, отдаёт index.html
    # Пункт 3 критичен для React Router: без него обновление страницы
    # на /trip/1 вернёт nginx 404 (файла /trip/1 на диске нет)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Кэширование статических ассетов ──────────────────────
    # JS/CSS/картинки Vite именует с хешем (index-3f2a1b.js) — они неизменны,
    # поэтому можно кэшировать на 1 год
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Отключаем логи для favicon (уменьшаем шум в логах)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}